name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # manual "Run workflow" button

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          command_timeout: 15m
          script: |
            cd ~/multichat-gxufy
            git fetch origin main
            git reset --hard origin/main
            npm ci
            # Windows-generated lockfile can omit the Linux SWC binary;
            # without it Next falls back to Babel and dies on OpenSSL 3
            npm install --no-save @next/swc-linux-$(node -p "process.arch")-gnu
            npm run build
            pm2 restart multichat --update-env
            pm2 save
